<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoLens | Çok Yönlü Dil Asistanı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <h1>LingoLens</h1>
                <p>Gramer Röntgeni & Akademik Analiz</p>
            </div>
           <button id="themeToggle" class="theme-switch" onclick="toggleTheme()" aria-label="Tema Değiştir">
    <div class="switch-track">
        <div class="switch-handle">
            <span class="mode-icon">🌙</span>
        </div>
    </div>
</button>
        </header>

        <div class="daily-article card">
            <h4>📌 Günün Akademik Okuması</h4>
            <p id="dailyArticleText">Yükleniyor...</p>
            <a href="#" id="dailyArticleLink" target="_blank">Habere Git →</a>
        </div>

        <div class="input-section card">
            <textarea id="textInput" placeholder="Analiz edilecek İngilizce metni buraya yapıştırın veya bir kelimeye tıklayarak anlamını görün..."></textarea>
            
            <div class="stats-bar">
                <div class="stat-item">Seviye: <span id="cefrLevel">A1</span></div>
                <div class="stat-item">Okuma: <span id="readTime">0</span> dk</div>
                <div class="stat-item">Akademik Puan: <span id="academicScore">%0</span></div>
            </div>
            
            <div class="academic-bar-container">
                <div id="academicProgress" class="academic-progress"></div>
            </div>

            <div class="main-controls">
                <button id="analyzeBtn" onclick="analyzeText()">Metni Röntgenle</button>
                <button id="clearBtn" onclick="clearText()" class="btn-ghost">Temizle</button>
            </div>
        </div>

        <div class="action-grid">
    <button id="ttsBtn" onclick="handleTTS()" class="action-btn">🔊 Sesli Oku</button>
    <button onclick="stopTTS()" class="action-btn">⏹️ Durdur</button>
    <button onclick="detectGrammar()" class="action-btn">💡 Gramer Teşhis</button>
    <button onclick="alert('PDF Oluşturuluyor...')" class="action-btn">📄 PDF Notu</button>
</div>

        <div id="grammarAlert" class="grammar-card card hidden">
            <h4>🔍 Gramer Bulguları</h4>
            <ul id="grammarList"></ul>
        </div>

        <div id="resultArea" class="result-card card hidden">
            <h3>Analiz Edilen Metin</h3>
            <div id="highlightedText" class="text-display"></div>
        </div>

        <div id="resultArea" class="result-card card hidden">
    <h3>Analiz Sonucu</h3>
    <div id="highlightedText" class="text-display"></div>
    
    <div class="translation-section">
        <h4>🇹🇷 Türkçe Çeviri</h4>
        <p id="translatedText" class="translation-display">Çeviri hazırlanıyor...</p>
    </div>
</div>

        <footer class="feedback-section card">
    <h4>💡 Geri Bildirim</h4>
    <form id="feedbackForm">
        <textarea id="feedbackInput" name="message" placeholder="Geliştirmem için önerin var mı?" class="input-field" required></textarea>
        <button type="submit" id="feedbackBtn" class="btn-primary">Gönder</button>
    </form>
    <p id="formStatus" style="margin-top: 15px; font-size: 0.9rem; font-weight: 600; display: none;"></p>
</footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
